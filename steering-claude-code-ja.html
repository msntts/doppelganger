    const md = `# Claude Code を制御する：CLAUDE.md、スキル、フック、ルール、サブエージェント、その他

Claude はあなたの作業スタイルに合わせて動作するように設計されており、Claude Code ではカスタマイズが可能です。

Claude の動作を指示する方法は **7 つ** あります：CLAUDE.md ファイル、ルール、スキル、サブエージェント、フック、出力スタイル、システムプロンプトへの追記。

各手法が制御するのは以下の 3 点です：

- 指示がいつコンテキストに読み込まれるか
- 長いセッションを通じて維持されるか（コンパクション時の挙動）
- どの程度の権威を持つか

---

## 指示を届ける 7 つの手法

### CLAUDE.md ファイル

CLAUDE.md はプロジェクトのルートに置く Markdown ファイルです。セッション開始時にコンテキストへ読み込まれ、セッション全体を通じてそこに留まります。

ビルドコマンド、ディレクトリ構成、モノレポ構造、コーディング規約、チームのルールはすべてここに自然に収まります。

2 種類があり、読み込まれ方が異なります。

- **常時読み込み型**：ルートレベルに置くもの。セッション開始時に読み込まれ、コンパクションを経ても維持されます。
- **オンデマンド型**：サブディレクトリに置くもの。Claude がそのディレクトリのファイルにアクセスしたときに読み込まれます。

共有リポジトリでは、CLAUDE.md は管理されていない設定ファイルと同じように膨らんでいきます。各チームが自分たちの指示を追記し、何も削除されない。その結果、全行がすべてのエンジニアの全セッションに読み込まれ、タスクに関係があろうとなかろうと消費されます。ファイルが大きくなったら、チーム固有の規約はパススコープのルールへ、手順はスキルへ移してください。

**CLAUDE.md は 200 行以内に抑え、オーナーを決め、コードと同じようにレビューしてください。** モノレポでは、各チームのディレクトリに専用のサブディレクトリ CLAUDE.md を置き、チームが自分たちの規約だけを読み込むようにしましょう。

---

### ルール

ルールは \`.claude/rules/\` に置く Markdown ファイルで、Claude に特定の制約や規約を伝えます。

スコープなしのルールは CLAUDE.md と同様、セッション開始時に常時読み込まれ、コンパクション時に再注入されます。**パススコープのルール**は、フロントマターに \`paths\` フィールドを追加することで、関連するときだけ読み込むようにできます。

ファイル固有の制約は、\`paths\` フロントマターに指定したルールとして置くのが最適です。横断的な関心事に関する指示には、ネストした CLAUDE.md ファイルよりもパススコープのルールを選んでください。

---

### スキル

スキルは \`.claude/skills/\` にあるフォルダ形式の指示・スクリプト・リソースの集まりで、Claude が動的に読み込みます。各スキルは名前・説明・本文を持つ \`SKILL.md\` ファイルを持ちます。

セッション開始時に読み込まれるのは名前と説明だけです。スラッシュコマンドや自動マッチングでスキルが呼び出されたとき、初めて本文全体が読み込まれます。

デプロイワークフロー、リリースチェックリスト、レビュープロセスのような **手順的な指示は、CLAUDE.md ではなくスキルに置いてください。**

---

### サブエージェント

サブエージェントは \`.claude/agents/\` に置く Markdown ファイルで、特定のサイドタスク専用の独立したアシスタントを定義します。各ファイルは YAML フロントマターと本文から成り、本文がそのサブエージェントのシステムプロンプトになります。

スキルと同様に、名前・説明・ツールリストはセッション開始時に読み込まれますが、エージェント本文の大きなコンテキストは自動起動しません。サブエージェントは独立した新鮮なコンテキストウィンドウで実行され、最終メッセージだけがメインセッションに返ってきます。

この **分離**こそが、スキルではなくサブエージェントを選ぶ主な理由の一つです。サイドタスクがメインの会話を中間結果で散らかしてしまう場合、つまりその中間結果を後で参照しないような場合にサブエージェントを使いましょう。

---

### フック

フックは、Claude のライフサイクル上の特定のイベントで発火することで、Claude の動作をより確実に制御するユーザー定義のコマンド・HTTP エンドポイント・LLM プロンプトです。

フックは \`settings.json\`、管理ポリシー設定、またはスキル／エージェントのフロントマターで登録します。種類は次のとおりです：\`command\`、\`HTTP\`、\`mcp_tool\`、\`prompt\`、\`agent\`。

フックはコンテキストコストが低い点が特徴です。設定がメインのコンテキストウィンドウの外に置かれるためです。**確実に実行されるべきこと**（編集後のリンター実行、完了時の Slack への通知、特定コマンドのブロックなど）にはフックを使いましょう。

---

### 出力スタイル

出力スタイルは \`.claude/output-styles/\` に置くファイルで、システムプロンプトに指示を注入します。コンパクションされることなく、すべてのセッション開始時に読み込まれ、最初のリクエスト後にキャッシュされます。

出力スタイルを変更すると、デフォルトの出力スタイルが置き換えられます（スタイルのフロントマターで \`keep-coding-instructions: true\` を設定した場合を除く）。

カスタム出力スタイルを書く前に、組み込みスタイルを確認してください。**Proactive**・**Explanatory**・**Learning** は最も一般的なニーズをカバーしており、スタイルファイルを自分でメンテナンスする必要がありません。

---

### システムプロンプトへの追記

出力スタイルを変更する代替手段として、\`append-system-prompt\` フラグがあります。追記フラグは元のシステムプロンプトへの**加算のみ**です。Claude の役割を変更するのではなく、デフォルトの役割に指示を追加するだけです。

システムプロンプトへの追記は、他の手法と比べてコンテキストコストが高くなる場合があります。入力トークンが増えますが、セッション内の最初のリクエスト後はプロンプトキャッシュによってコストが下がります。

システムプロンプトへの追記は、特定のコーディング標準・出力フォーマット・ドメイン固有の知識を追加するのに最適です。

---

## Claude Code カスタマイズのクイックヒント

以下のようなことをしているなら、指示の置き場所を見直すとよいかもしれません：

- **CLAUDE.md に「毎回 X のときは必ず Y する」と書いている** → 代わりにフックを使う
- **CLAUDE.md に「絶対にこれをするな」と書いている** → 指示ではなく、フックとパーミッションによる確実な強制が必要
- **CLAUDE.md に 30 行の手順が書いてある** → スキルに移す
- **\`paths:\` のない API 固有のルールがある** → 関係のない作業中にコンテキストを消費しないよう \`paths:\` でスコープを絞る
- **個人的な好みをプロジェクトレベルの CLAUDE.md に書いている** → ローカルファイルを使う

---

## はじめ方

Claude Code を最大限に活用するためのヒントやパターンは、ベストプラクティスのドキュメントで確認できます。

これらをいくつか動かせるようになったら、複数の設定を **プラグイン** としてまとめて、チームメンバーやプロジェクト間で一貫したセットアップを共有することもできます。
